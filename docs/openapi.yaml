          type: number
          format: float
        vat_rate:
          type: number
          format: float

    # Common Schemas
    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 150
        total_pages:
          type: integer
          example: 8
        has_next:
          type: boolean
          example: true
        has_prev:
          type: boolean
          example: false

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"

    Error:
      type: object
      properties:
        error:
          type: string
          example: "validation_error"
        message:
          type: string
          example: "Invalid request data"
        details:
          type: object
          nullable: true
        code:
          type: string
          example: "VALIDATION_ERROR"

  parameters:
    # Common Parameters
    PageParam:
      name: page
      in: query
      description: Page number for pagination
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      description: Number of items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    SearchParam:
      name: search
      in: query
      description: Search term for filtering results
      schema:
        type: string

    SortParam:
      name: sort
      in: query
      description: Sort field and direction (e.g., 'created_at:desc')
      schema:
        type: string

    DateFromParam:
      name: date_from
      in: query
      description: Start date for filtering (ISO 8601)
      schema:
        type: string
        format: date

    DateToParam:
      name: date_to
      in: query
      description: End date for filtering (ISO 8601)
      schema:
        type: string
        format: date

    GroupByParam:
      name: group_by
      in: query
      description: Group results by period (day, week, month)
      schema:
        type: string
        enum: [day, week, month]
        default: day

    StatusParam:
      name: status
      in: query
      description: Filter by status
      schema:
        type: string

    IsActiveParam:
      name: is_active
      in: query
      description: Filter by active status
      schema:
        type: boolean

    CustomerIdParam:
      name: customerId
      in: path
      required: true
      description: Customer unique identifier
      schema:
        type: string
        format: uuid

    AppointmentIdParam:
      name: appointmentId
      in: path
      required: true
      description: Appointment unique identifier
      schema:
        type: string
        format: uuid

    StaffIdParam:
      name: staffId
      in: path
      required: true
      description: Staff member unique identifier
      schema:
        type: string
        format: uuid

    ProductIdParam:
      name: productId
      in: path
      required: true
      description: Product unique identifier
      schema:
        type: string
        format: uuid

    OrderIdParam:
      name: orderId
      in: path
      required: true
      description: Order unique identifier
      schema:
        type: string
        format: uuid

    PaymentIdParam:
      name: paymentId
      in: path
      required: true
      description: Payment unique identifier
      schema:
        type: string

    UserIdParam:
      name: user_id
      in: query
      description: Filter by user ID
      schema:
        type: string
        format: uuid

    CategoryParam:
      name: category
      in: query
      description: Filter by category ID
      schema:
        type: string
        format: uuid

  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "unauthorized"
            message: "Authentication required"
            code: "UNAUTHORIZED"

    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "forbidden"
            message: "Insufficient permissions"
            code: "FORBIDDEN"

    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "not_found"
