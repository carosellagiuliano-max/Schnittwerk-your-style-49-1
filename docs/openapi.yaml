      properties:
        items:
          type: array
          items:
            type: object
            required:
              - product_id
              - quantity
            properties:
              product_id:
                type: string
                format: uuid
              quantity:
                type: integer
                minimum: 1
        is_gift_wrapped:
          type: boolean
        gift_wrap_gender:
          type: string
          enum: [female, male, child, other]
