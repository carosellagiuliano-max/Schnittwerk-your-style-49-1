    # Order Schemas
    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        order_number:
          type: string
          example: "ORD-2024-001"
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, delivered, cancelled]
        subtotal:
          type: number
          format: float
          example: 89.70
        tax_amount:
          type: number
          format: float
          example: 6.91
        total_amount:
          type: number
          format: float
          example: 96.61
        currency:
          type: string
          example: "CHF"
        payment_method:
          type: string
          example: "stripe"
        payment_status:
          type: string
          enum: [pending, completed, failed, refunded, partially_refunded]
        payment_intent_id:
          type: string
          nullable: true
        is_gift_wrapped:
          type: boolean
          example: false
        gift_wrap_gender:
          type: string
          enum: [female, male, child, other]
          nullable: true
